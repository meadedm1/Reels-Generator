<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOOL NAME — @theugcmaverik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <style>
    /* =====================================================
       STARTER TEMPLATE — based on the Reels Generator pattern
       Steps to reuse for a new tool:
       1. Change the <title> and the CONFIG block in the script below
       2. Recolor the CSS variables in :root if this tool needs its own look
       3. Update the SYSTEM prompt to match what this tool should generate
       4. Update the chips to match this tool's presets
       5. Deploy a new Worker for this tool, paste its URL into WORKER_URL
    ===================================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Swap these per tool if you want a different look.
         Defaults below match the Reels Generator. */
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #a78bfa;
      --accent-dim: rgba(167,139,250,0.12);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --coral: #fb923c;
      --coral-dim: rgba(251,146,60,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2.5rem; }
    .brand { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
    h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 600; letter-spacing: -0.02em; color: var(--text); margin-bottom: 8px; }
    .tagline { font-size: 15px; color: var(--muted); }

    .input-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .input-row input {
      flex: 1; background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 0 14px; height: 44px;
      font-size: 15px; color: var(--text); font-family: inherit;
      transition: border-color 0.15s;
    }
    .input-row input:focus { outline: none; border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    button.primary {
      background: var(--accent); color: #0f0f0f; border: none;
      border-radius: var(--radius-sm); padding: 0 20px; height: 44px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
    }
    button.primary:hover { opacity: 0.88; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.75rem; }
    .chip {
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .chip:hover, .chip.active {
      background: var(--accent-dim); color: var(--accent);
      border-color: var(--accent);
    }

    .status { font-size: 13px; color: var(--muted); min-height: 20px; margin-bottom: 1.25rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.4rem;
      display: flex; flex-direction: column; gap: 12px;
    }

    .card-top { display: flex; justify-content: space-between; align-items: center; }
    .card-meta { font-size: 11px; color: var(--muted); font-weight: 500; }
    .timer { font-size: 11px; color: var(--muted); }

    .slabel {
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
    }
    .stext { font-size: 14px; line-height: 1.55; color: var(--text); }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 9px; border-radius: 20px; margin-bottom: 5px;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .b-hook { background: var(--accent-dim); color: var(--accent); }
    .b-prob { background: var(--coral-dim); color: var(--coral); }
    .b-val  { background: var(--green-dim); color: var(--green); }
    .b-cta  { background: var(--amber-dim); color: var(--amber); }

    .vlist { padding-left: 1.1rem; }
    .vlist li { font-size: 14px; line-height: 1.65; color: var(--text); }

    .card-foot {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 10px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .ready { font-size: 11px; color: var(--muted); }

    button.copy {
      font-size: 12px; font-weight: 500; font-family: inherit;
      padding: 5px 14px; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    button.copy:hover { border-color: var(--accent); color: var(--accent); }
    button.copy.copied { color: var(--green); border-color: var(--green); }

    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 1rem; color: var(--muted); font-size: 14px;
    }
    .empty svg { display: block; margin: 0 auto 14px; opacity: 0.25; }

    .error-msg { color: #f87171; font-size: 12px; margin-top: 6px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(167,139,250,0.3); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: -3px; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; }
      button.primary { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="brand">@theugcmaverik</div>
      <h1>TOOL NAME</h1>
      <p class="tagline">One line describing what this tool generates</p>
    </header>

    <div class="input-row">
      <input type="text" id="topicIn" value="" placeholder="Enter any topic..." />
      <button class="primary" onclick="generate()" id="genBtn">Generate</button>
    </div>

    <div class="chips" id="chips">
      <!-- Swap these for this tool's presets. Each onclick calls pick(this, 'value') -->
      <span class="chip active" onclick="pick(this,'Preset topic one')">Preset one</span>
      <span class="chip" onclick="pick(this,'Preset topic two')">Preset two</span>
      <span class="chip" onclick="pick(this,'Preset topic three')">Preset three</span>
    </div>

    <div class="status" id="status"></div>

    <div class="grid" id="grid">
      <div class="empty">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z"/></svg>
        Hit "Generate" to create results
      </div>
    </div>

  </div>

  <script>
    // =====================================================
    // CONFIG — the four things you change per new tool
    // =====================================================

    // 1. Paste this tool's own Cloudflare Worker URL (each tool gets its own Worker)
    const WORKER_URL = 'YOUR_WORKER_URL_HERE';

    // 2. Tell Claude what this tool should produce.
    //    Keep the "return ONLY valid JSON" instruction, just change the fields
    //    and rules to match this tool's output.
    const SYSTEM = `You are a [DESCRIBE THE TOOL'S JOB] for @theugcmaverik.
Tone: conversational, high-energy, creator-friendly.
Return ONLY a valid JSON array of exactly 4 objects. No markdown, no backticks, no preamble.
Each object must have:
- fieldOne: string
- fieldTwo: string
- fieldThree: array of strings
- fieldFour: string`;

    // 3. Update this if the JSON shape above changes (used to render cards below)
    // 4. Update the user-facing prompt sent per generation, in generate() below

    let busy = false;
    window._items = [];

    function pick(el, val) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('topicIn').value = val;
    }

    function copyCard(i) {
      const s = window._items[i];
      const t = JSON.stringify(s, null, 2); // simple default — customize per tool's fields
      navigator.clipboard.writeText(t).then(() => {
        const b = document.getElementById('cp' + i);
        if (b) { b.textContent = 'Copied!'; b.classList.add('copied'); setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('copied'); }, 1800); }
      });
    }

    function renderCards(items) {
      const g = document.getElementById('grid');
      g.innerHTML = '';
      items.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'card';
        // Customize this markup to match the fields defined in SYSTEM above
        d.innerHTML = `
          <div class="card-top">
            <span class="card-meta">Result ${i + 1}</span>
          </div>
          <div class="stext">${JSON.stringify(s)}</div>
          <div class="card-foot">
            <span class="ready">Ready</span>
            <button class="copy" id="cp${i}" onclick="copyCard(${i})">Copy</button>
          </div>`;
        g.appendChild(d);
      });
    }

    async function generate() {
      if (busy) return;
      if (WORKER_URL === 'YOUR_WORKER_URL_HERE') {
        document.getElementById('status').innerHTML = '<span style="color:#f87171;">Add your Cloudflare Worker URL to the WORKER_URL variable in this file first.</span>';
        return;
      }
      busy = true;
      const topic = document.getElementById('topicIn').value.trim() || 'default topic';
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';
      document.getElementById('status').textContent = 'Working on it...';
      document.getElementById('grid').innerHTML = '<div class="empty"><span class="spinner"></span> Claude is generating...</div>';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            system: SYSTEM,
            messages: [{ role: 'user', content: `Generate results about: "${topic}". Return only the JSON array.` }]
          })
        });

        if (!res.ok) throw new Error(`Worker returned ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

        const raw = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
        const items = JSON.parse(raw);
        window._items = items;
        renderCards(items);
        document.getElementById('status').textContent = 'Results ready — click Copy on any card';

      } catch (e) {
        document.getElementById('grid').innerHTML = `<div class="empty">Could not generate.<div class="error-msg">${e.message}</div></div>`;
        document.getElementById('status').textContent = '';
        console.error(e);
      }

      btn.disabled = false;
      btn.textContent = 'Generate';
      busy = false;
    }

    document.getElementById('topicIn').addEventListener('keydown', e => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
